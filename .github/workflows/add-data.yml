name: OPS - Them du lieu cau hoi (incremental, khong seed lai)

# Quy trinh hang ngay khi CHI THEM CAU HOI:
#   1. Sua/them noi dung trong prisma/*.mjs (bank_*.mjs, interview*.mjs, istqb.mjs)
#   2. Push len nhanh 'ops-data'
#   3. Workflow nay chay `node prisma/sync_questions.mjs` -> CHI CHEN CAU MOI
#
# KHONG stop service, KHONG npm ci, KHONG next build, KHONG seed lai bai viet.
# KHONG dung: .env, schema.prisma, web.config, next.config.mjs, dev.db, node_modules, .next
on:
  push:
    branches: [ ops-data ]
  workflow_dispatch:
    inputs:
      prune:
        description: "Don cau da go khoi nguon? (0 = chi them, khong xoa) - MAC DINH 0 an toan"
        required: false
        default: "0"
      dry:
        description: "Chay thu, khong ghi? (1 = dry run)"
        required: false
        default: "0"

concurrency:
  group: data-production
  cancel-in-progress: false

jobs:
  sync:
    name: Chen cau hoi moi vao DB production
    runs-on: [self-hosted, windows, testing]
    steps:
      - uses: actions/checkout@v4

      - name: Copy CHI file noi dung prisma/*.mjs
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $dest = "C:\apps\testing"
          if (-not (Test-Path "$dest\prisma")) { Write-Host "Khong thay $dest\prisma"; exit 1 }
          robocopy "$env:GITHUB_WORKSPACE\prisma" "$dest\prisma" *.mjs /NFL /NDL /NJH /NJS /NP | Out-Null
          if ($LASTEXITCODE -ge 8) { Write-Host "robocopy failed ($LASTEXITCODE)"; exit 1 }
          $global:LASTEXITCODE = 0
          Write-Host "==> Da dong bo prisma\*.mjs (chi noi dung, khong dung config)"

      - name: Sync cau hoi (incremental, atomic)
        shell: powershell
        env:
          SYNC_PRUNE: ${{ github.event.inputs.prune || '0' }}
          SYNC_DRY: ${{ github.event.inputs.dry || '0' }}
        run: |
          $ErrorActionPreference = "Continue"
          Set-Location "C:\apps\testing"
          node prisma/sync_questions.mjs
          if ($LASTEXITCODE -ne 0) { Write-Host "!!! sync_questions FAILED"; exit 1 }

      - name: Health check (site chay suot, khong downtime)
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:3210/istqb" -UseBasicParsing -TimeoutSec 30
            Write-Host "HTTP $($r.StatusCode) /istqb"
            if ($r.StatusCode -ne 200) { exit 1 }
          } catch {
            Write-Host "Health check FAIL: $($_.Exception.Message)"
            exit 1
          }
          exit 0
